<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard - Book Bridge</title>
<link rel="stylesheet" href="style.css">

<style>
body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    margin: 0;
}

.header{
    background:#2e7d32;
    color:white;
    padding:18px;
    text-align:center;
}

.navbar{
    background:#1b5e20;
    padding:12px;
    text-align:center;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin:15px;
    font-weight:bold;
    cursor:pointer;
}

.hero{
    padding:20px;
    text-align:center;
}

/* STATS */
.stats{
    display:flex;
    gap:20px;
    justify-content:center;
    margin-top:15px;
}

.stat-card{
    background:white;
    padding:15px 25px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* CONTROLS */
.controls{
    display:flex;
    gap:10px;
    margin:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.controls input, .controls select{
    padding:8px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* GRID */
.grid{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    padding:20px;
}

.user-card, .book-card{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    width:220px;
}

.section {
    padding: 20px;
    display: none;
}

#controls-wrapper{
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.status-pending{
    background: #fff3cd;
    color: #856404;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: bold;
}

.status-delivered{
    background: #d4edda;
    color: #155724;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: bold;
}

.status-cancelled{
    background: #f8d7da;
    color: #721c24;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: bold;
}

.book-card.pending { border-left: 5px solid #ffc107; }
.book-card.delivered { border-left: 5px solid #28a745; }
.book-card.cancelled { border-left: 5px solid #dc3545; }

.orders-wrapper {
    display: flex;
    flex-direction: column;  /* 🔥 THIS makes them go one below another */
    gap: 30px;
    padding: 20px;
}

.order-group {
    width: 100%;
}

.order-group h3 {
    margin-bottom: 10px;
}

/* FOOTER */
.footer{
    background:#1b5e20;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:auto;
}
</style>
</head>

<body>

<div class="header">
<h1>📚 Book Bridge Admin</h1>
</div>

<!-- NAVBAR -->
<div class="navbar">
    <a onclick="goHome()">Home</a>
    <a onclick="showSection('users')">Users</a>
    <a onclick="showSection('books')">Books</a>
    <a onclick="showSection('orders')">Orders</a>
    <a onclick="logout()">Logout</a>
</div>

<div class="hero">
<h2 id="adminName"></h2>

<div class="stats">
<div class="stat-card" id="userCount"></div>
<div class="stat-card" id="bookCount"></div>
</div>
</div>

<!-- 🔍 CONTROLS WRAPPER -->
<div id="controls-wrapper">

    <!-- USER CONTROLS -->
    <div id="user-controls" class="controls">
        <input type="text" id="searchUser" placeholder="Search Users">
        <select id="filterRole">
            <option value="">All Roles</option>
            <option value="admin">Admin</option>
            <option value="user">User</option>
        </select>
    </div>

    <!-- BOOK CONTROLS -->
    <div id="book-controls" class="controls">
        <input type="text" id="searchBook" placeholder="Search Books">
        <select id="filterCategory">
                <option>All Categories</option>
                <option>Fantasy</option>
                <option>Romance</option>
                <option>Thriller</option>
                <option>Action</option>
                <option>Self-help</option>
                <option>Slice of Life</option>
                <option>History</option>
                <option>Science</option>
                <option>Math</option>
        </select>
    </div>

</div>

<!-- USERS -->
<div id="users-section" class="section">
<h2>👥 Users</h2>
<div id="users" class="grid"></div>
</div>

<!-- BOOKS -->
<div id="books-section" class="section">
<h2>📚 Books</h2>
<div id="books" class="grid"></div>
</div>

<!-- ORDERS -->
<div id="orders-section" class="section">
<h2>📦 Orders</h2>
<div id="orders-container" class="grid"></div>
</div>

<div class="footer">
© 2026 Book Bridge Admin
</div>

<script src="admin.js"></script>

</body>
</html>
