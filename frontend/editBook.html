<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Book</title>
<link rel="stylesheet" href="style.css">

<style>

.header {
    background: #2e7d32;
    color: white;
    padding: 18px;
    text-align: center;
}

.container {
    padding: 40px;
    max-width: 900px;
    margin: auto;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
}

.form-grid {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;
}

.form-group {
    flex: 1 1 45%;
    display: flex;
    flex-direction: column;
}

.form-group.full {
    flex: 1 1 100%;
}

label {
    margin-bottom: 6px;
    font-weight: 600;
    color: #2e7d32;
}

input, select, textarea {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

input:focus, select:focus, textarea:focus {
    border-color: #66bb6a;
    box-shadow: 0 0 6px #c8e6c9;
    outline: none;
}

/* IMAGE SECTION */
.image-section {
    margin-bottom: 30px;
    padding-top: 20px;
}

.image-section input {
    margin-bottom: 10px;
}

#preview {
    display: block;
    max-width: 180px;
    margin: 20px auto 10px auto;
    border-radius: 12px;
}

.button-box {
    text-align: center;
    margin-top: 25px;
}

button {
    padding: 12px 25px;
}

</style>

</head>

<body>

<div class="header">
    <h1>Edit Book</h1>
    <p>Update your listing ✏️</p>
</div>

<div class="container">

<div class="card">
  <form id="editBookForm" enctype="multipart/form-data">
    <div class="image-section">
      <label>Update Image</label>
      <input type="file" id="imageInput" name="image" accept="image/*">
      <img id="preview" src="https://via.placeholder.com/150">
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label>Book Title</label>
        <input id="title" name="title">
      </div>
      <div class="form-group">
        <label>Author</label>
        <input id="author" name="author">
      </div>
      <div class="form-group">
        <label>Price (₹)</label>
        <input id="price" name="price">
      </div>
      <div class="form-group">
        <label>Condition</label>
        <select id="condition_text" name="condition_text">
          <option value="">Select condition</option>
        </select>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="category" name="category">
          <option value="Fantasy">Fantasy</option>
          <option value="Romance">Romance</option>
          <option value="Thriller">Thriller</option>
          <option value="Action">Action</option>
          <option value="Self-help">Self-help</option>
          <option value="Slice of Life">Slice of Life</option>
          <option value="History">History</option>
          <option value="Science">Science</option>
          <option value="Math">Math</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Description</label>
        <textarea id="description" name="description"></textarea>
      </div>
    </div>

    <div class="button-box">
      <button type="button" onclick="updateBook()">Update</button>
    </div>
  </form>
</div>

</div>

<script src="editBook.js"></script>

</body>
</html>
