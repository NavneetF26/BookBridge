<!DOCTYPE html>
<html>
<head>
    <title>My Orders - Book Bridge</title>
    <link rel="stylesheet" href="style.css">
</head>

<style>
/* STATUS BADGES */
.status-pending{
    background: #fff3cd;
    color: #856404;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: bold;
}

.status-delivered{
    background: #d4edda;
    color: #155724;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: bold;
}

.status-cancelled{
    background: #f8d7da;
    color: #721c24;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: bold;
}

/* 🔥 LAYOUT FIX */
.horizontal-orders {
    display: flex;
    flex-direction: row;
    gap: 15px;
    overflow-x: auto;
    padding-bottom: 10px;
}

.vertical-orders {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* Scrollbar only for horizontal */
.horizontal-orders::-webkit-scrollbar {
    height: 6px;
}
.horizontal-orders::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 10px;
}
</style>

<body>

<!-- HEADER -->
<header>
    <h2>📦 My Orders</h2>

    <div class="nav-right">
        <a href="index.html" class="btn">Home</a>
        <a href="cart.html" class="btn">Cart</a>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</header>

<!-- MAIN -->
<div id="orders-container" style="padding: 25px;"></div>

<script src="orders.js"></script>

<script>
function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
}
</script>

</body>
</html>
