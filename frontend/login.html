<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Book Bridge</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<div class="login-card">

    <h1>📚 Book Bridge</h1>
    <p class="tagline">Login to continue</p>

    <form id="loginForm">

        <!-- ROLE SELECT (ONLY FOR REGISTER) -->
        <div class="role-switch" style="margin-bottom:10px; gap:10px; justify-content:center;">
            <button type="button" onclick="setRole('user', this)" class="active">User</button>
            <button type="button" onclick="setRole('admin', this)">Admin</button>
        </div>

        <input type="text" id="username" placeholder="Username OR Email" required>

        <!-- Only for register -->
        <input type="email" id="email" placeholder="Email" style="display:none;">

        <input type="password" id="password" placeholder="Password" required>

        <button type="submit">Login</button>

        <p class="switch-text">
            New user? <span id="toggleMode">Register here</span>
        </p>

    </form>

</div>

<script src="login.js"></script>
</body>
</html>
