<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Bridge</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="menu-btn" onclick="toggleMenu()">⋮</div>
<div id="sideMenu" class="side-menu">
    <div class="menu-header">
        <h3 id="menuUserName">User</h3>
        <p>Welcome back 👋</p>
    </div>
    <hr>
    <a onclick="goTo('books')">📚 My Books</a>
    <a onclick="goTo('cart')">🛒 View Cart (<span id="menu-cart-count">0</span>)</a>
    <a onclick="goTo('orders')">📦 Orders</a>
    <hr>
    <a onclick="logout()">🚪 Logout</a>
</div>
<div id="overlay" onclick="toggleMenu()"></div>

<header>
    <h1>📚 Book Bridge</h1>

    <input type="text" id="search" placeholder="Search books by title or author...">

    <div class="nav-right">
        <span id="userName"></span>
        <a href="add.html" class="btn">+ Add Book</a>
    </div>
</header>

<button onclick="loadBooks()">All Books</button>
<button onclick="window.location.href='cart.html'">🛒 View Cart (<span id="cart-count">0</span>)</button>
<button onclick="window.location.href='orders.html'">📦 Orders</button>

<main id="books-container">
    <p>Loading books...</p>
</main>

<script src="main.js" defer></script>

</body>
</html>
